<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>佛農山 → 倫敦（Vernon Hills → London, ON）— 自駕旅行</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<style>
  :root{
    --paper:#F0EBDD;
    --paper-dark:#E4DCC3;
    --ink:#23281F;
    --pine:#1F4B3F;
    --pine-dark:#153327;
    --highway:#E8A33D;
    --rust:#B5502D;
    --steel:#4A6670;
    --line:#C7BC9C;
    --white:#FFFBF0;
    --food:#B5502D;
    --stay:#1F4B3F;
    --see:#4A6670;
    --drive:#8A8060;
    --us-navy:#2B3A67;
    --us-red:#B22234;
    --ca-red:#D52B1E;
    --topbar-border-gradient:linear-gradient(
      90deg,
      var(--us-red) 0 25%,
      var(--white) 25% 30%,
      var(--us-navy) 30% 50%,
      var(--ca-red) 50% 75%,
      var(--white) 75% 80%,
      var(--ca-red) 80% 100%
    );
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:Georgia,'Times New Roman',serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.disp{
    font-family:'Arial Narrow','Helvetica Neue',Helvetica,Arial,sans-serif;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.06em;
  }
  .mono{font-family:'Courier New',Courier,monospace;}

  .status-bar{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--pine-dark);
    color:var(--paper);
    font-family:'Courier New',monospace;
    font-size:11px;
    letter-spacing:0.03em;
    padding:6px 16px;
    max-height:40px;
    overflow:hidden;
    transition:max-height .35s ease, padding .35s ease, opacity .35s ease;
  }
  .status-bar.hidden{
    max-height:0;
    padding-top:0;
    padding-bottom:0;
    opacity:0;
  }
  .status-bar.done .status-dot{ background:#5FBF7A; animation:none; }
  .status-bar.error .status-dot{ background:var(--us-red); animation:none; }
  .status-dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--highway);
    flex-shrink:0;
    animation:statusPulse 1s ease-in-out infinite;
  }
  @keyframes statusPulse{
    0%,100%{ opacity:1; transform:scale(1); }
    50%{ opacity:.4; transform:scale(0.7); }
  }

  .topbar{
    background:var(--us-navy);
    color:#fff;
    padding:14px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
    border-bottom:5px solid transparent;
    border-image:var(--topbar-border-gradient) 1;
  }
  .topbar .title .stars{ letter-spacing:0.3em; color:#fff; font-size:11px; }
  .topbar .title{
    font-size:24px;
    letter-spacing:0.04em;
    text-shadow:0 1px 3px rgba(0,0,0,.35);
  }
  .topbar .title small{
    display:block;
    font-family:Georgia,serif;
    text-transform:none;
    letter-spacing:normal;
    font-size:11.5px;
    color:#F2C4C2;
    margin-top:3px;
    font-style:italic;
  }
  .odometer{
    background:rgba(0,0,0,.22);
    border:1px solid var(--us-red);
    border-radius:3px;
    padding:5px 11px;
    text-align:center;
  }
  .odometer .num{
    font-family:'Courier New',monospace;
    font-size:17px;
    color:#fff;
    letter-spacing:0.05em;
  }
  .odometer .lbl{
    font-size:8px;
    letter-spacing:0.13em;
    text-transform:uppercase;
    color:#F2C4C2;
  }

  #map{ height:100%; width:100%; }

  .layout2col{
    display:grid;
    grid-template-columns:44% 56%;
    align-items:stretch;
    height:calc(100vh - 92px);
  }
  .mapcol{ height:100%; position:sticky; top:0; }
  .mapcol #map{ border-right:2px solid var(--line); }
  .infocol{
    height:100%;
    overflow-y:auto;
  }
  .map-toggle{
    display:none;
    position:absolute;
    top:8px;
    right:8px;
    z-index:1000;
    background:rgba(35,40,31,.85);
    color:#fff;
    border:none;
    border-radius:4px;
    padding:6px 11px;
    font-size:11px;
    font-family:'Arial Narrow',sans-serif;
    font-weight:700;
    letter-spacing:0.03em;
    cursor:pointer;
  }
  @media (max-width:900px){
    .layout2col{
      display:block;
      height:auto;
    }
    .mapcol{
      position:sticky;
      top:0;
      z-index:40;
      height:180px;
      overflow:hidden;
      transition:height .2s ease;
    }
    .mapcol.collapsed{ height:0; }
    .mapcol #map{ border-right:none; border-bottom:2px solid var(--line); }
    .infocol{ height:auto; overflow-y:visible; }
    .map-toggle{ display:block; }
    .topbar{ padding:10px 12px; }
    .topbar .title{ font-size:19px; }
    .topbar .title small{ font-size:10.5px; margin-top:2px; }
    .odometer{ padding:4px 9px; }
    .odometer .num{ font-size:15px; }
    .tabwrap{ padding:8px 10px; }
    .daycontent{ padding:0 10px 12px; }
    .dayhead{ padding:9px 10px; }
    .panel{ padding:0 10px 6px 10px; }
  }
  .leaflet-tile-pane{ filter:sepia(18%) saturate(65%) brightness(1.04) contrast(0.95); }

  .tabwrap{
    max-width:1320px;
    margin:0 auto;
    padding:10px 14px;
  }
  .tabbar{
    display:flex;
    flex-wrap:wrap;
    gap:5px;
  }
  .tab{
    background:var(--paper-dark);
    border:1px solid var(--line);
    border-bottom:3px solid var(--steel);
    border-radius:3px 3px 0 0;
    padding:6px 9px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .tab.us{ border-bottom-color:var(--us-navy); }
  .tab.ca{ border-bottom-color:var(--ca-red); }
  .tab.active{ background:var(--white); border-bottom-color:var(--rust); }
  .tab.active.us{ border-bottom-color:var(--us-red); }
  .tab.active.ca{ border-bottom-color:var(--ca-red); }
  .tab-num{
    width:20px;height:20px;border-radius:50%;
    background:var(--steel);
    color:#fff;
    font-family:'Arial Narrow',sans-serif;
    font-weight:700;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;
    flex-shrink:0;
  }
  .tab.us .tab-num{ background:var(--us-navy); }
  .tab.ca .tab-num{ background:var(--ca-red); }
  .tab.active .tab-num{ background:var(--rust); }
  .tab.active.us .tab-num{ background:var(--us-red); }
  .tab.active.ca .tab-num{ background:var(--ca-red); }
  .tab-text{ line-height:1.2; }
  .tab-date{
    font-size:9px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--steel);
  }
  .tab-short{
    font-family:'Arial Narrow',sans-serif;
    font-weight:700;
    font-size:11.5px;
    color:var(--ink);
    max-width:130px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .daycontent{
    max-width:1320px;
    margin:0 auto;
    padding:0 14px 18px;
  }
  .daycard{
    background:var(--white);
    border:1px solid var(--line);
    border-top:none;
    border-radius:0 0 3px 3px;
    overflow:hidden;
  }
  .dayhead{
    display:flex;
    align-items:center;
    gap:9px;
    padding:11px 12px;
    border-bottom:2px solid rgba(0,0,0,.15);
    position:relative;
    overflow:hidden;
  }
  .dayhead.has-photo{
    padding:10px 12px 9px;
    min-height:110px;
    align-items:flex-end;
  }
  svg.dayhead-bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    z-index:0;
    display:block;
  }
  img.dayhead-bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
    z-index:0;
  }
  .dayhead-scrim{
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(20,25,18,.08) 0%, rgba(20,25,18,.15) 40%, rgba(20,25,18,.82) 100%);
    z-index:1;
  }
  .dayhead > *:not(.dayhead-bg):not(.dayhead-scrim){ position:relative; z-index:2; }
  .dayhead.has-photo .day-date{ color:var(--highway); }
  .dayhead.has-photo .day-title{ color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.6); }
  .dayhead.has-photo .day-meta{ color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.6); }
  .art-credit{
    position:absolute;
    right:8px;
    bottom:4px;
    font-size:8.5px;
    color:rgba(255,255,255,.85);
    font-style:italic;
    text-shadow:0 1px 3px rgba(0,0,0,.6);
    z-index:2;
  }
  .day-num{
    width:24px;height:24px;border-radius:50%;
    background:var(--pine);
    color:var(--highway);
    font-family:'Arial Narrow',sans-serif;
    font-weight:700;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;
    flex-shrink:0;
  }
  .flagbadge{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-family:'Courier New',monospace;
    font-size:9.5px;
    letter-spacing:0.06em;
    padding:2px 7px 2px 5px;
    border-radius:2px;
    margin-top:2px;
  }
  .flagbadge.us{ background:#EAEEF6; color:var(--us-navy); border:1px solid var(--us-navy); }
  .flagbadge.ca{ background:#FDEAE8; color:var(--ca-red); border:1px solid var(--ca-red); }
  .flagbadge svg{ display:block; }
  .day-head-text{ min-width:0; }
  .day-date{
    font-size:10px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--highway);
  }
  .day-title{
    font-family:'Arial Narrow',sans-serif;
    font-weight:700;
    font-size:14px;
    line-height:1.25;
    color:#fff;
  }
  .day-meta{
    font-size:10.5px;
    color:rgba(255,255,255,.75);
    font-family:'Courier New',monospace;
    white-space:nowrap;
    margin-left:auto;
  }

  .panel{ padding:0 12px 8px 12px; }
  .stop{
    display:grid;
    grid-template-columns:46px 24px 1fr;
    gap:8px;
    padding:7px 0;
    border-top:1px dashed var(--line);
  }
  .stop:first-child{ border-top:none; }
  .stop-time{
    font-family:'Courier New',monospace;
    font-size:11px;
    color:var(--steel);
    padding-top:1px;
  }
  .stop-icon{
    width:22px;height:22px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    color:var(--white);
    flex-shrink:0;
  }
  .stop-icon svg{ width:12px;height:12px; }
  .stop-icon.stay{ background:var(--stay); }
  .stop-icon.food{ background:var(--food); }
  .stop-icon.see{ background:var(--see); }
  .stop-icon.drive{ background:var(--drive); }
  .stop-name{
    font-weight:700;
    font-family:'Arial Narrow',sans-serif;
    font-size:13.5px;
    letter-spacing:0.01em;
    text-transform:none;
    color:var(--ink);
  }
  .stop-addr{
    font-size:11px;
    color:var(--steel);
    margin-top:1px;
  }
  .stop-cost{
    font-family:'Courier New',monospace;
    font-size:11.5px;
    color:var(--rust);
    margin-top:3px;
    font-weight:700;
  }
  .stop-note{
    font-size:12.5px;
    margin-top:3px;
    line-height:1.4;
    color:var(--ink);
  }
  .tag{
    display:inline-block;
    font-family:'Courier New',monospace;
    font-size:9px;
    text-transform:uppercase;
    letter-spacing:0.08em;
    padding:1px 5px;
    border:1px solid var(--line);
    border-radius:2px;
    color:var(--steel);
  }
  .tagrow{
    display:flex;
    flex-wrap:wrap;
    gap:5px;
    margin-top:3px;
  }
  .ai-tag{
    font-family:'Arial Narrow',sans-serif;
    text-transform:none;
    letter-spacing:0.01em;
    font-weight:700;
    color:#6B3FA0;
    background:#F1E9FA;
    border-color:#B79AD9;
  }
  .legend{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    padding:9px 16px;
    border-top:1px solid var(--line);
    font-size:11px;
    color:var(--steel);
    background:var(--paper-dark);
  }
  .legend span{ display:inline-flex; align-items:center; gap:5px; }
  .dot{ width:9px;height:9px;border-radius:50%; display:inline-block; }
  .foot{
    padding:9px 16px 16px;
    font-size:10.5px;
    color:var(--steel);
    line-height:1.5;
    max-width:760px;
  }
  .carmark{
    filter:drop-shadow(0 0 1px rgba(0,0,0,.4));
  }
</style>
</head>
<body>

<div id="statusBar" class="status-bar">
  <span class="status-dot"></span>
  <span id="statusText">正在載入行程資料&hellip;</span>
</div>

<div class="topbar">
  <div class="title"><span class="stars">&#9733; &#9733; &#9733;</span>&nbsp; 佛農山（Vernon Hills）, IL &rarr; 倫敦（London）, ON &nbsp;<span class="stars">&#9733; &#9733; &#9733;</span>
    <small>8月3日&ndash;10日．8天路線，途經賓州（PA）、紐約市（NYC）、哈德遜河谷（Hudson Valley）、尼加拉瀑布（Niagara）與安大略省（Ontario）</small>
  </div>
  <div class="odometer" id="countdownBadge">
    <div class="num" id="countdownNum">&hellip;</div>
    <div class="lbl">距離出發</div>
  </div>
  <div class="odometer">
    <div class="num" id="odo">0 mi</div>
    <div class="lbl">行程里程</div>
  </div>
</div>

<div class="layout2col">
  <div class="mapcol" id="mapCol">
    <button class="map-toggle" id="mapToggle" type="button">隱藏地圖 &#9650;</button>
    <div id="map"></div>
  </div>
  <div class="infocol">
    <div class="tabwrap">
      <div id="dayTabs" class="tabbar"></div>
    </div>
    <div class="daycontent">
      <div class="daycard" id="dayCard"></div>
    </div>
    <div class="legend">
      <span><span class="dot" style="background:var(--stay)"></span>飯店</span>
      <span><span class="dot" style="background:var(--food)"></span>美食</span>
      <span><span class="dot" style="background:var(--see)"></span>景點</span>
      <span><span class="dot" style="background:var(--drive)"></span>在路上</span>
      <span><span class="tag ai-tag" style="margin:0;">&#10024; AI建議</span>&nbsp;= 我主動建議，非您指定的行程</span>
    </div>
    <div class="foot">
      路線僅為規劃用的概略直線，並非逐步導航路線&mdash;&mdash;實際駕駛請使用GPS。里程與車程時間僅供參考。飯店與景點標記已盡量貼近實際地址，但出發前請再次確認。沒有標示「AI建議」的項目，都是您提供的行程內容。
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
const ICONS = {

  drive: '<path d="M3 13l2-5a2 2 0 012-1h10a2 2 0 012 1l2 5v5a1 1 0 01-1 1h-1a1 1 0 01-1-1v-1H6v1a1 1 0 01-1 1H4a1 1 0 01-1-1z" stroke="white" stroke-width="1.4" fill="none" stroke-linejoin="round"/><circle cx="7" cy="15.5" r="1.2" fill="white"/><circle cx="17" cy="15.5" r="1.2" fill="white"/>'

const FLAG_US = `<svg viewBox="0 0 19 14" width="17" height="12"><rect width="19" height="14" fill="#B22234"/><rect y="1.08" width="19" height="1.08" fill="#fff"/><rect y="3.23" width="19" height="1.08" fill="#fff"/><rect y="5.38" width="19" height="1.08" fill="#fff"/><rect y="7.54" width="19" height="1.08" fill="#fff"/><rect y="9.69" width="19" height="1.08" fill="#fff"/><rect y="11.85" width="19" height="1.08" fill="#fff"/><rect width="8.2" height="7.54" fill="#2B3A67"/></svg>`;

const COUNTRY_LABEL = { us:'美國 (USA)', ca:'加拿大 (CANADA)' };
const COUNTRY_FLAG = { us:FLAG_US, ca:FLAG_CA };

const DAYS = [
{
  country:"us", date:"8\u67083\u65e5\uff08\u9031\u4e00\uff09", title:"\u4f5b\u8fb2\u5c71\uff08Vernon Hills\uff09, IL \u2192 \u5fb7\u62c9\u59c6\u65af\uff08Drums\uff09, PA", dist:"~800 \u82f1\u91cc", time:"~12\u201313 \u5c0f\u6642",
  stops:[
    {t:"8:00 AM", type:"drive", name:"\u5f9e\u4f5b\u8fb2\u5c71\uff08Vernon Hills, IL\uff09\u51fa\u767c", lat:42.2076, lng:-87.9806, note:"\u7b2c\u4e00\u5929\u8def\u7a0b\u8f03\u9577\u2014\u2014\u7d04800\u82f1\u91cc\uff0f12\u201313\u5c0f\u6642\uff0c\u8d70I-80/I-81\u516c\u8def\u3002\u5efa\u8b70\u4e2d\u9014\u5b89\u6392\u5e7e\u6b21\u4f11\u606f\u3002", tag:"\u958b\u8eca\u65e5"},
    {t:"Evening", type:"stay", name:"Holiday Inn Express Drums-Hazleton", addr:"Drums, PA 18222", lat:40.9765, lng:-75.8999, note:"\u7576\u665a\u5165\u4f4f\u3002", cost:"\u5171 $117.54 \u00b7 3\u9593\u623f \u00b7 1\u665a", tag:"\u98ef\u5e97"},
    {t:"Dinner", type:"food", name:"\u98ef\u5e97\u9644\u8fd1\u7684\u8f15\u9b06\u665a\u9910", lat:40.9765, lng:-75.8999, note:"\u9ed1\u6fa4\u723e\u9813\uff08Hazleton\uff09I-80/81\u516c\u8def\u51fa\u53e3\u9644\u8fd1\u6709\u7c21\u4fbf\u7684\u9910\u9928\u548c\u62ab\u85a9\u5e97\uff0c\u9069\u5408\u9577\u9014\u99c5\u99db\u5f8c\u8f15\u9b06\u7684\u7b2c\u4e00\u665a\u3002", tag:"\u5efa\u8b70", ai:true}
  ]

const TRIP_START = new Date(2026, 7, 3); // Aug 3, 2026 (month is 0-indexed)
const TRIP_END = new Date(2026, 7, 10);  // Aug 10, 2026
function updateCountdown(){
  const now = new Date();
  const todayMid = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const msPerDay = 86400000;
  const daysUntil = Math.round((TRIP_START - todayMid) / msPerDay);
  const numEl = document.getElementById('countdownNum');
  const lblEl = document.querySelector('#countdownBadge .lbl');
  if(daysUntil > 1){
    numEl.textContent = daysUntil + ' 天';
    lblEl.textContent = '距離出發';
  }else if(daysUntil === 1){
    numEl.textContent = '明天';
    lblEl.textContent = '準備出發！';
  }else if(daysUntil === 0){
    numEl.textContent = '今天';
    lblEl.textContent = '出發日快樂！';
  }else if(todayMid <= TRIP_END){
    const tripDay = Math.round((todayMid - TRIP_START) / msPerDay) + 1;
    numEl.textContent = '第 ' + tripDay + ' 天';
    lblEl.textContent = '旅程進行中';
  }else{
    numEl.textContent = '\u2713';
    lblEl.textContent = '旅程已結束';
  }
}
updateCountdown();

function iconFor(type){
  const markerBg = MARKER_BG[type] || MARKER_BG.drive;
  const markerHTML = `

      <svg viewBox="0 0 24 24" width="${MARKER_ICON_SIZE}" height="${MARKER_ICON_SIZE}">${ICONS[type]}</svg>
    </div>

  return L.divIcon({
    html:markerHTML,
    iconSize:[MARKER_SIZE,MARKER_SIZE],
    iconAnchor:[MARKER_SIZE/2,MARKER_SIZE/2]
  });
}


const OSRM_HOSTS = [
  'https://router.project-osrm.org',
  'https://routing.openstreetmap.de/routed-car'
];

function dedupe(pts){
  const out = [pts[0]];
  for(let i=1;i<pts.length;i++){
    const [a,b] = pts[i], [pa,pb] = out[out.length-1];
    if(Math.abs(a-pa) > 1e-5 || Math.abs(b-pb) > 1e-5) out.push(pts[i]);
  }
  return out;
}

async function fetchRoad(pts){
  const cleanPts = dedupe(pts);
  if(cleanPts.length < 2) return null;
  const coords = cleanPts.map(p=>`${p[1]},${p[0]}`).join(';');
  for(const host of OSRM_HOSTS){
    try{
      const url = `${host}/route/v1/driving/${coords}?overview=full&geometries=geojson`;
      const res = await fetch(url);
      if(!res.ok) continue;
      const data = await res.json();
      if(data.code !== 'Ok' || !data.routes || !data.routes.length) continue;
      return data.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]);
    }catch(e){ /* try next host */ }
  }
  return null;
}

function curvedFallback(pts){
  if(pts.length < 2) return pts;
  const out = [pts[0]];
  for(let i=0;i<pts.length-1;i++){
    const [lat1,lng1] = pts[i], [lat2,lng2] = pts[i+1];
    const midLat = (lat1+lat2)/2, midLng = (lng1+lng2)/2;
    const dLat = lat2-lat1, dLng = lng2-lng1;
    const dist = Math.sqrt(dLat*dLat + dLng*dLng);
    const bulge = Math.min(dist*0.12, 0.6);
    const nx = -dLng, ny = dLat;
    const nlen = Math.sqrt(nx*nx+ny*ny) || 1;
    const cLat = midLat + (nx/nlen)*bulge;
    const cLng = midLng + (ny/nlen)*bulge;
    for(let t=0.08;t<=1.0001;t+=0.08){
      const x = (1-t)*(1-t)*lat1 + 2*(1-t)*t*cLat + t*t*lat2;
      const y = (1-t)*(1-t)*lng1 + 2*(1-t)*t*cLng + t*t*lng2;
      out.push([x,y]);
    }
  }
  return out;
}

let requestToken = 0;

async function drawDay(i){
  if(!mapReady) return;
  const myToken = ++requestToken;
  const d = DAYS[i];
  dayLayer.clearLayers();

  const pts = d.stops.map(s=>[s.lat,s.lng]);

  d.stops.forEach((s,si)=>{
    L.marker([s.lat,s.lng], {icon:iconFor(s.type)})
      .addTo(dayLayer)
      .bindTooltip(`${si+1}. ${s.name}`, {direction:'top', offset:[0,-14]});
  });

  if(pts.length>1){
    map.fitBounds(L.latLngBounds(pts), {padding:[40,40]});
  } else {
    map.setView(pts[0], 11);
  }
  if(pts.length<2){
    setStatus('已就緒', 'done');
    hideStatus(600);
    return;
  }

  setStatus(`正在規劃第${i+1}天路線\u2026`, 'loading');
  let roadPts = null;
  try{
    roadPts = await fetchRoad(pts);
  }catch(e){
    roadPts = null;
  }
  if(myToken !== requestToken) return;

  if(roadPts){
    L.polyline(roadPts, {color:RUST_COLOR, weight:4, opacity:0.85, lineJoin:'round'}).addTo(dayLayer);
    setStatus('路線規劃完成', 'done');
  }else{
    L.polyline(curvedFallback(pts), {color:RUST_COLOR, weight:3, dashArray:'6 6', opacity:0.85, lineJoin:'round', smoothFactor:1}).addTo(dayLayer);
    setStatus('已顯示概略路線', 'done');
  }
  hideStatus(700);
}
